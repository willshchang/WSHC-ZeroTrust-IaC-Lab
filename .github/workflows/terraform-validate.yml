# ============================================================
# TERRAFORM VALIDATION PIPELINE
# ============================================================
# Automatically validates Tailscale Terraform code on every
# push and pull request.
#
# What this pipeline checks:
# 1. terraform fmt  — enforces consistent code formatting
# 2. terraform validate — checks syntax and config validity
#
# Why this matters:
# IaC without automated validation is incomplete. This pipeline
# ensures every commit meets baseline quality standards —
# catching formatting issues and syntax errors before they
# reach the main branch.
#
# Official reference:
# https://developer.hashicorp.com/terraform/tutorials/automation/github-actions
# ============================================================

name: Terraform Validate

on:
  push:
    paths:
      - 'Tailscale/terraform/**'
      - 'Entra IAM/terraform/**'
  pull_request:
    paths:
      - 'Tailscale/terraform/**'
      - 'Entra IAM/terraform/**'

jobs:
  validate-tailscale:
    name: Validate Tailscale Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        working-directory: Tailscale/terraform
        run: terraform fmt -check -recursive
        # Fails if any file is not properly formatted
        # Run `terraform fmt` locally to fix formatting issues

      - name: Terraform Init
        working-directory: Tailscale/terraform
        run: terraform init -backend=false
        # -backend=false skips state backend init
        # Allows validation without real credentials

      - name: Terraform Validate
        working-directory: Tailscale/terraform
        run: terraform validate
        # Checks syntax and internal consistency
        # Does not connect to Tailscale API

  validate-entra:
    name: Validate Entra IAM Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        working-directory: Entra IAM/terraform
        run: terraform fmt -check -recursive

      #- name: Terraform Init
      #  working-directory: Entra IAM/terraform
      #  run: terraform init -backend=false

      #- name: Terraform Validate
      #  working-directory: Entra IAM/terraform
      #  run: terraform validate